name: Supabase keep-alive

on:
  schedule:
    - cron: '0 6 */3 * *'   # every 3 days at 6 AM UTC = 11:30 AM IST
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://wxolmlxphwieqvyfuyfu.supabase.co/rest/v1/leagues?select=name" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "Response: $STATUS"
          [ "$STATUS" = "200" ] && echo "✓ Supabase alive" || echo "⚠ Unexpected status: $STATUS"
