name: Daily Supabase Backup

on:
  schedule:
    - cron: '30 1 * * *'   # 1:30 AM UTC = 7:00 AM IST every day
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppress Node.js 20 warning

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          mkdir -p backups
          TIMESTAMP=$(date +%Y-%m-%d)

          # Use Supabase session pooler (port 5432, IPv4) — direct DB (port 5432)
          # is blocked from GitHub Actions runners. Pooler works reliably.
          pg_dump \
            --host=aws-0-ap-southeast-1.pooler.supabase.com \
            --port=5432 \
            --username=postgres.wxolmlxphwieqvyfuyfu \
            --dbname=postgres \
            --no-password \
            --format=plain \
            --table=public.users \
            --table=public.leagues \
            --table=public.matches \
            --table=public.predictions \
            --data-only \
            --column-inserts \
            > backups/backup-${TIMESTAMP}.sql

          BYTES=$(wc -c < backups/backup-${TIMESTAMP}.sql)
          ROWS=$(grep -c "^INSERT" backups/backup-${TIMESTAMP}.sql || true)
          echo "✓ Backup complete: ${BYTES} bytes, ${ROWS} INSERT statements → backups/backup-${TIMESTAMP}.sql"

      - name: Keep only last 30 backups
        run: |
          cd backups
          ls -t backup-*.sql 2>/dev/null | tail -n +31 | xargs --no-run-if-empty rm -f
          echo "Files retained: $(ls backup-*.sql 2>/dev/null | wc -l)"

      - name: Commit backup
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "backup: $(date +%Y-%m-%d)"
            git push
          fi
